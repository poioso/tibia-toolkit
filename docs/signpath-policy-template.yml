# Copy this file only after replacing both placeholders with the real SignPath
# project and signing-policy slugs. Then place it at:
# .signpath/policies/<project-slug>/<signing-policy-slug>.yml
github-policies:
  runners:
    require_github_hosted: true
  build:
    disallow_reruns: true
  branch_rulesets:
    - condition:
        rules:
          - block_force_pushes: true
          - require_pull_request:
              min_required_approvals: 1
              dismiss_stale_reviews_on_push: true
              require_code_owner_review: true
              require_last_push_approval: true
              require_review_thread_resolution: true
          - require_code_scanning:
              tools:
                - tool: CodeQL
                  min_alerts_threshold: errors
                  min_security_alerts_threshold: high
        allow_bypass_actors: false
        enforced_from: EARLIEST
