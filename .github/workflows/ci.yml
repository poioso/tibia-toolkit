name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-and-build:
    name: Validate and build Windows artifact
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          global-json-file: global.json

      - name: Install dependencies
        run: npm ci

      - name: Validate public source
        run: npm run check

      - name: Scan for secrets
        shell: pwsh
        run: |
          $gitleaksVersion = '8.30.1'
          $expectedSha256 = 'd29144deff3a68aa93ced33dddf84b7fdc26070add4aa0f4513094c8332afc4e'
          $archivePath = Join-Path $env:RUNNER_TEMP "gitleaks_$gitleaksVersion`_windows_x64.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "gitleaks_$gitleaksVersion"
          $downloadUrl = "https://github.com/gitleaks/gitleaks/releases/download/v$gitleaksVersion/gitleaks_$gitleaksVersion`_windows_x64.zip"

          Invoke-WebRequest -UseBasicParsing -Uri $downloadUrl -OutFile $archivePath
          $actualSha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $archivePath).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "Gitleaks checksum mismatch. Expected $expectedSha256 but received $actualSha256."
          }

          Expand-Archive -LiteralPath $archivePath -DestinationPath $extractPath -Force
          & (Join-Path $extractPath 'gitleaks.exe') git --redact --verbose

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Generate Node dependency SBOM
        shell: pwsh
        run: .\scripts\generate-sbom.ps1

      - name: Build unsigned installer artifact
        run: npm run build:installer

      - name: Verify unsigned package structure
        shell: pwsh
        run: .\scripts\verify-release.ps1 -AllowUnsigned

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom-${{ github.sha }}
          path: artifacts/sbom/npm.spdx.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload unsigned test artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: unsigned-test-build-${{ github.sha }}
          path: dist/tibia-toolkit-release
          if-no-files-found: error
          retention-days: 7
